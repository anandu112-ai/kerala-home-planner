services:
  # ── Backend (FastAPI / Python) — deployed on Render ───────────────────────
  # Frontend is deployed separately on Vercel.
  # After deploying the backend, set FRONTEND_URL in the Render dashboard
  # to your Vercel frontend URL (e.g. https://kerala-home-planner.vercel.app)
  # so CORS allows your Vercel deployment.
  - type: web
    name: kerala-home-planner-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel frontend URL, e.g. https://kerala-home-planner.vercel.app
      # LLM keys for AI site condition analysis (set ONE of the following):
      - key: GEMINI_API_KEY
        sync: false   # Recommended — Google Gemini (free tier available)
      - key: OPENAI_API_KEY
        sync: false   # Alternative — OpenAI GPT-4o-mini
      # Optional: force a specific LLM provider ("gemini" or "openai")
      # - key: LLM_PROVIDER
      #   value: gemini
